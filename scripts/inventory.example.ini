# =============================================================================
# token-diet — example Ansible inventory
#
# Copy this file to inventory.ini and edit it for your environment.
# Then run:
#   ansible-playbook -i scripts/inventory.ini scripts/playbook.yml
#
# All examples below assume:
#   - SSH key-based auth (no password prompts)
#   - The remote user has sudo rights if system packages need installing
#     (though this playbook uses become: false by default)
# =============================================================================

# -----------------------------------------------------------------------------
# Development workstations — install everything, online mode
# -----------------------------------------------------------------------------
[devstations]
dev-mac-01  ansible_host=192.168.1.10  ansible_user=alice
dev-linux-01  ansible_host=192.168.1.11  ansible_user=bob

# -----------------------------------------------------------------------------
# CI agents — install RTK + tilth only, skip Serena and Claude config
# -----------------------------------------------------------------------------
[ci_agents]
ci-runner-01  ansible_host=10.0.0.20  ansible_user=ci
ci-runner-02  ansible_host=10.0.0.21  ansible_user=ci

[ci_agents:vars]
install_serena=false
configure_claude=false

# -----------------------------------------------------------------------------
# Air-gapped servers — use local forks, no internet access required
# The token-diet repo (with populated forks/ submodules) must already be
# present at token_diet_dest on the control node, or synced separately.
# -----------------------------------------------------------------------------
[airgap]
secure-host-01  ansible_host=172.16.0.5  ansible_user=ops
secure-host-02  ansible_host=172.16.0.6  ansible_user=ops

[airgap:vars]
install_mode=local

# -----------------------------------------------------------------------------
# Localhost — install on the Ansible control node itself
# -----------------------------------------------------------------------------
[local]
localhost  ansible_connection=local

# -----------------------------------------------------------------------------
# All hosts — shared defaults
# -----------------------------------------------------------------------------
[all:vars]
# Override the default repo destination if you want a non-standard path:
# token_diet_dest=/opt/token-diet

# Default Python interpreter (avoids deprecation warnings on newer distros):
ansible_python_interpreter=/usr/bin/python3

# SSH multiplexing for faster subsequent connections (optional):
# ansible_ssh_common_args='-o ControlMaster=auto -o ControlPersist=60s'
