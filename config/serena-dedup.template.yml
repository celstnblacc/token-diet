# Serena project.local.yml — overlap fix when tilth is also installed
# Copy this file to your project root as project.local.yml
#
# Disables Serena tools that tilth handles faster (Rust + tree-sitter < LSP)
#
# Serena keeps: rename_symbol, find_referencing_symbols (LSP-grade),
#               diagnostics, memory, workflow tools
# tilth handles: file reading, symbol search, structural outlines

context: claude-code
disabled_tools:
  - get_symbols_overview    # tilth outline is faster (Rust, no LSP)
  - find_symbol             # tilth definition search is faster
  - read_file               # tilth adaptive read is smarter
